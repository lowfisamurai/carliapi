name: CI

on:
  push:
    branches:
      - main
      - develop
      - feat/**
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --runInBand

      - name: End-to-end tests
        run: npm run test:e2e -- --runInBand

      - name: Build application
        run: npm run build

      - name: Discord Alert Notification
        if: always()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "🚨 [Carli API] O Pipeline de CI (Lint, Testes Unitários e Build) acabou de rodar no GitHub Actions! Confira o status."}' \
          ${{ secrets.DISCORD_WEBHOOK }}
